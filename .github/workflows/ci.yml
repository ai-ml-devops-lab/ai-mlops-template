name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest -q --cov=src --cov-report=term-missing
      - name: Docker build
        run: docker build -t local/${{ github.event.repository.name }}:${{ github.sha }} .

      - name: Train model and upload small artifacts
        run: python -m mlops_template.train
      - uses: actions/upload-artifact@v4
        with:
          name: model-metadata
          path: |
            artifacts/metrics.json
            artifacts/model_version.json
            artifacts/MODEL_CARD.md
          retention-days: 7
